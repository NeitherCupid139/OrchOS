name: Deploy (Pro)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VITE_ENABLE_PRO: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      # ── Private submodule authentication ──
      - name: Authenticate private submodule (PAT)
        if: secrets.GH_PRO_PAT != ''
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_PRO_PAT }}@github.com/NeitherCupid139/OrchOS-Pro".insteadOf "https://github.com/NeitherCupid139/OrchOS-Pro"
          git config --global url."https://x-access-token:${{ secrets.GH_PRO_PAT }}@github.com/NeitherCupid139/OrchOS-Pro".insteadOf "git@github.com:NeitherCupid139/OrchOS-Pro.git"

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install

      # Generate wrangler.jsonc from template.
      # Payment and gateway credentials are set manually in the runtime environment.
      - name: Generate wrangler config
        run: |
          cp apps/web/wrangler.example.jsonc apps/web/wrangler.jsonc

      - name: Build
        run: bun run build
        env:
          VITE_ENABLE_PRO: "true"

      - name: Apply D1 migrations
        run: bun run --filter=web db:migrate:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare
        run: bun run deploy:cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
